<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2196F3, #0D47A1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: white;
      padding: 35px 40px;
      border-radius: 15px;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    h2 {
      margin-bottom: 25px;
      color: #0D47A1;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    input:focus {
      border-color: #2196F3;
      box-shadow: 0 0 6px rgba(33, 150, 243, 0.4);
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }
    .login-btn {
      background-color: #0D47A1;
    }
    .login-btn:hover {
      background-color: #1976D2;
    }
    .back-btn {
      background-color: #6c757d;
    }
    .back-btn:hover {
      background-color: #5a6268;
    }
    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🔒 Admin Login</h2>
    <input type="text" id="username" placeholder="Enter Username" required />
    <input type="password" id="password" placeholder="Enter Password" required />
    <button class="btn login-btn" onclick="login()">Login</button>
    <button class="btn back-btn" onclick="location.href='login.html'">Back</button>
    <p id="error"></p>
    <div class="footer">© 2025 School Management Portal</div>
  </div>

  <script>
    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const error = document.getElementById('error');
      // Example simple validation check
      if (username === 'admin' && password === 'admin123') {
        // Redirect to admin dashboard or home page
        window.location.href = 'admin-dashboard.html';
      } else {
        error.style.color = 'red';
        error.textContent = 'Invalid username or password';
      }
    }
  </script>

</body>
</html>
