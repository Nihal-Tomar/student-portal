<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
    }
    .login-box { 
      background: white; 
      padding: 35px 40px; 
      border-radius: 15px; 
      box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
      width: 320px; 
      text-align: center; 
      /* No hover movement */
    }
    h2 { 
      margin-bottom: 25px; 
      color: #2e7d32; 
    }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 10px 0; 
      border: 1px solid #ccc;
      border-radius: 8px; 
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    input:focus {
      border-color: #4caf50;
      box-shadow: 0 0 6px rgba(76,175,80,0.3);
    }
    .btn { 
      width: 100%; 
      padding: 12px; 
      margin-top: 10px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      color: white; 
      font-size: 16px;
      transition: 0.3s;
    }
    .login-btn { background-color: #4caf50; }
    .login-btn:hover { background-color: #43a047; }
    .back-btn { background-color: #6c757d; }
    .back-btn:hover { background-color: #5a6268; }
    #error {
      color: red;
      font-size: 14px;
      margin-top: 8px;
    }
    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🎓 Student Login</h2>
    <form onsubmit="return studentLogin(event)">
      <input type="text" id="studentID" placeholder="Student ID" required>
      <input type="password" id="studentPass" placeholder="Password" required>
      <button type="submit" class="btn login-btn">Login</button>
      <button type="button" class="btn back-btn" onclick="location.href='login.html'">Back</button>
    </form>
    <p id="error"></p>
    <div class="footer">© 2025 School Management Portal</div>
  </div>

  <script>
   function studentLogin(event) {
  event.preventDefault();

  const credentials = {
    student01: "1234",
    student02: "5678",
    student03: "abcd"
  };

  const id = document.getElementById("studentID").value.trim();
  const pass = document.getElementById("studentPass").value.trim();
  const error = document.getElementById("error");

  if (credentials[id] && credentials[id] === pass) {
    localStorage.setItem("loggedStudentId", id);
    window.location.href = "student-dashboard.html";
  } else {
    error.textContent = "Invalid Student ID or Password!";
  }
}


  </script>
</body>
</html>
